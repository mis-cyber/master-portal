<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SK Universal Hub</title>
    <link id="app-favicon" rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1B20_Ncg4NGd3adYK2bst0xeTN7UO-DVY">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Styling */
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            background-color: #f4f7fa; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* Top Header */
        .header { 
            background: #005A9C; color: white; padding: 15px; 
            text-align: center; font-weight: bold; font-size: 18px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; 
            order: 1; 
        }

        /* Desktop Navigation (Top) */
        .nav-tabs { 
            display: flex; background: white; z-index: 5; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            order: 2; 
        }
        
        .tab-btn { 
            flex: 1; padding: 12px 5px; text-align: center; 
            background: none; border: none; font-weight: bold; 
            color: #64748b; cursor: pointer; transition: 0.3s; 
            font-size: 14px; border-bottom: 3px solid transparent; 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            text-decoration: none; 
        }
        .tab-btn i { font-size: 16px; }
        .tab-btn.active { color: #005A9C; border-bottom: 3px solid #005A9C; background: #f0f7ff; }

        /* Iframe Container */
        .iframe-container { 
            flex-grow: 1; width: 100%; position: relative; 
            order: 3; z-index: 1; 
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Loading Spinner */
        .loader-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 2; 
            transition: opacity 0.3s; pointer-events: none; 
        }
        .loader-overlay.hidden { opacity: 0; }
        .spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #005A9C; 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 1s linear infinite; margin-bottom: 10px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Responsive Layout (Nav Bottom) */
        @media (max-width: 768px) {
            .nav-tabs {
                order: 3; 
                border-top: 1px solid #e2e8f0;
                border-bottom: none;
                box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
                padding-bottom: env(safe-area-inset-bottom); 
                flex-wrap: wrap; /* UPDATE: 4 tabs ko fit karne ke liye */
            }
            .iframe-container { order: 2; } 
            .tab-btn {
                flex-basis: 25%; /* UPDATE: Har button ko 25% width dega */
                flex-direction: column;
                padding: 10px 2px; /* Thoda padding adjust kiya */
                font-size: 10px; /* Font size adjust kiya */
                gap: 4px;
                border-bottom: none;
                border-top: 3px solid transparent; 
            }
            .tab-btn.active {
                border-bottom: none;
                border-top: 3px solid #005A9C;
            }
            .tab-btn i { font-size: 18px; }
        }

        /* Floating Toggle Button */
        #nav-toggle-btn {
            position: fixed;
            top: 12px;
            right: 15px;
            z-index: 9999; 
            background: rgba(0, 90, 156, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #nav-toggle-btn:hover {
            background: #004a80;
            transform: scale(1.05);
        }
        
        /* Hide Header aur Tabs */
        .collapsed {
            display: none !important;
        }
    </style>
</head>
<body>

    <button id="nav-toggle-btn" onclick="toggleNav()" title="Full Screen Mode">
        <i class="fas fa-expand"></i>
    </button>

    <div class="header" id="master-header">
        SK Universal Hub
    </div>

    <div class="nav-tabs">
        <a href="?app=workspace" onclick="openSmartTab(event, this.href, 'tab_workspace', this)" class="tab-btn">
            <i class="fas fa-desktop"></i> <span>WorkSpace</span>
        </a>
        <a href="?app=sales" onclick="openSmartTab(event, this.href, 'tab_sales', this)" class="tab-btn">
            <i class=""></i> <span>Order Portal By Sales</span>
        </a>
        <a href="?app=po" onclick="openSmartTab(event, this.href, 'tab_po', this)" class="tab-btn">
            <i class="fas fa-shopping-cart"></i> <span>Main Po Portal</span>
        </a>
    </div>

    <div class="iframe-container">
        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <div style="color: #64748b; font-weight: bold; font-size: 12px;">Loading Application...</div>
        </div>
        <iframe id="main-frame" src="" onload="hideLoader()"></iframe>
    </div>

    <script>
        // UPDATE: Charo Naye Apps Ke Links (Apne Real Links Yahan Daalein)
        const appLinks = {
            'workspace': 'https://script.google.com/macros/s/AKfycbxt4rHJ-BPFPi2sju5HfzLiMebOVQ0JcthojI_g5qNIws_hZv2eFgXcGtHfYyzzHyU/exec',
            'sales': 'https://script.google.com/macros/s/AKfycbw4EDPaDRSXxU1TvkchGwdHc-JaCEFFNm9kZG2JMqnCDYMefpZCL_ML0_jFNQXD-fnI/exec',
            'po': 'https://script.google.com/macros/s/AKfycbyNTuq3kPhtaLWsBt0JmPlndJPr5fiRqg-ipUcZRJFZiLQPZsgRGwS2Os87c_kHjO_cDw/exec'
        };

        // UPDATE: Naye Tabs Ke Liye Clear Page Titles
        const appTitles = {
            'workspace': 'WorkSpace 💻- SK Hub',
            'sales': ' Order Portal By Sales - SK Hub',
            'po': 'Main Po Portal 🛒- SK Hub'
        };

        // UPDATE: Page load hone par Default WorkSpace open karega aur URL update karega
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            let appId = urlParams.get('app');
            
            // Default 1st Tab Setup
            if (!appId) {
                appId = 'workspace'; 
                window.history.replaceState({ app: appId }, '', '?app=' + appId); // URL me ?app=workspace add kar dega
            }
            
            // Iframe me sahi link load karo
            if (appLinks[appId]) {
                document.getElementById('main-frame').src = appLinks[appId];
            }

            // Browser ke Tab ka naam change karo
            if (appTitles[appId]) {
                document.title = appTitles[appId];
            }
            
            // Sahi tab ko active/highlight karo
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeTab = document.querySelector(`a[href="?app=${appId}"]`);
            if(activeTab) {
                activeTab.classList.add('active');
            }
        };

        const activeWindows = {};

        // ADVANCED SMART TAB LOGIC
        function openSmartTab(event, url, tabName, btnElement) {
            if(event) event.preventDefault();

            const urlParams = new URLSearchParams(window.location.search);
            const currentApp = urlParams.get('app') || 'workspace'; // UPDATE: Default fallback
            if (url.includes('?app=' + currentApp)) {
                return; 
            }

            try {
                let win = window.open('', tabName);
                
                if (win.location.href === 'about:blank') {
                    win.location.href = url; 
                }
            } catch (err) {
                window.open(url, tabName);
            }
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        function toggleNav() {
            const header = document.getElementById('master-header');
            const nav = document.querySelector('.nav-tabs');
            const icon = document.querySelector('#nav-toggle-btn i');
            
            header.classList.toggle('collapsed');
            nav.classList.toggle('collapsed');
            
            if(header.classList.contains('collapsed')) {
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            } else {
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
        }
    </script>

</body>
</html>
